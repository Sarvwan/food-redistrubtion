<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Food Relief Platform</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <nav class="navbar">
    <a href="/index.html" class="nav-brand">
      <img src="/images/logo.png" alt="Food Relief Logo">
      Food Relief
    </a>
    <ul class="nav-links">
      <li><a href="/login.html">Login</a></li>
    </ul>
  </nav>

  <div class="form-container">
    <h2>Create an Account</h2>
    <div id="alertContainer" class="alert hidden"></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required minlength="8">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role" required>
          <option value="donor">Donor (Individual / Business)</option>
          <option value="ngo">NGO (Organization)</option>
        </select>
      </div>

      <!-- NGO Extra Fields -->
      <div id="ngoFields" class="hidden">
        <div class="form-group">
          <label>Organization Name</label>
          <input type="text" id="organizationName">
        </div>
        <div class="form-group">
          <label>Registration Number</label>
          <input type="text" id="registrationNumber">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="general_ngo">General NGO</option>
            <option value="orphanage">Orphanage</option>
            <option value="old_age_home">Old Age Home</option>
            <option value="school">School / Educational</option>
          </select>
        </div>
        <div class="form-group">
          <label>Full Address</label>
          <input type="text" id="address">
        </div>
        <div class="form-group">
          <label>Location Coordinates (Lng, Lat)</label>
          <div style="display:flex; gap:10px;">
            <input type="text" id="lng" placeholder="Longitude" readonly>
            <input type="text" id="lat" placeholder="Latitude" readonly>
            <button type="button" class="btn btn-outline" id="getLocationBtn" style="white-space:nowrap;">Get Location</button>
          </div>
          <small>Required for NGOs to receive nearby donations.</small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top:10px;">Register</button>
    </form>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const roleSelect = document.getElementById('role');
    const ngoFields = document.getElementById('ngoFields');

    roleSelect.addEventListener('change', (e) => {
      if (e.target.value === 'ngo') {
        ngoFields.classList.remove('hidden');
      } else {
        ngoFields.classList.add('hidden');
      }
    });

    document.getElementById('getLocationBtn').addEventListener('click', () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          document.getElementById('lng').value = pos.coords.longitude;
          document.getElementById('lat').value = pos.coords.latitude;
        }, () => authHelper.showAlert("Could not fetch location."));
      } else {
        authHelper.showAlert("Geolocation is not supported by this browser.");
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const role = document.getElementById('role').value;
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value,
        role: role
      };

      if (role === 'ngo') {
        data.organizationName = document.getElementById('organizationName').value;
        data.registrationNumber = document.getElementById('registrationNumber').value;
        data.category = document.getElementById('category').value;
        data.address = document.getElementById('address').value;
        
        const lng = document.getElementById('lng').value;
        const lat = document.getElementById('lat').value;
        
        if (!lng || !lat) {
          authHelper.showAlert('Please provide location coordinates using the Get Location button.');
          return;
        }

        data.longitude = lng;
        data.latitude = lat;
      }

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();

        if (res.ok) {
          authHelper.setToken(result.token);
          authHelper.showAlert('Registration successful! Redirecting...', 'success');
          setTimeout(() => authHelper.redirectBasedOnRole(), 1500);
        } else {
          authHelper.showAlert(result.errors ? result.errors[0].msg : result.msg);
        }
      } catch (err) {
        authHelper.showAlert('An error occurred during registration.');
      }
    });
  </script>
</body>
</html>
