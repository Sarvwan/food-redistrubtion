<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Food Relief Platform</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <nav class="navbar">
    <a href="/index.html" class="nav-brand">
      <img src="/images/logo.png" alt="Food Relief Logo">
      Food Relief Admin
    </a>
    <ul class="nav-links">
      <li><a href="#" id="logoutBtn" class="btn btn-outline">Logout</a></li>
    </ul>
  </nav>

  <div class="dashboard-container">
    <main class="dashboard-content" style="max-width: 1200px; margin: 0 auto; width: 100%;">
      
      <div class="stats-grid" id="adminStats">
        <!-- JS rendered -->
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="adminHelper.switchTab('pendingNgos')">Pending NGOs</button>
        <button class="tab-btn" onclick="adminHelper.switchTab('allDonations')">All Donations</button>
      </div>
      
      <div id="alertContainer" class="alert hidden"></div>

      <div id="pendingNgos" class="tab-content active">
        <h3>NGOs Awaiting Approval</h3>
        <div id="ngosList" class="card-grid" style="margin-top:20px;"></div>
      </div>

      <div id="allDonations" class="tab-content">
        <h3>Donation History</h3>
        <div style="margin-top: 20px; margin-bottom: 20px; display:flex; gap:10px;">
          <select id="filterStatus" style="padding: 8px; border:1px solid #ddd; border-radius:4px;">
            <option value="">All Statuses</option>
            <option value="open">Open</option>
            <option value="claimed">Claimed</option>
            <option value="collected">Collected</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <input type="text" id="filterCity" placeholder="Filter by City" style="padding: 8px; border:1px solid #ddd; border-radius:4px;">
          <button class="btn btn-primary" onclick="adminHelper.fetchDonations()">Apply Filter</button>
        </div>
        <div id="donationsList" class="card-grid"></div>
      </div>

    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      authHelper.checkAuth(['admin']);
      authHelper.setupLogoutButton();
      adminHelper.fetchStats();
      adminHelper.fetchPendingNGOs();
      adminHelper.fetchDonations();
    });
  </script>
</body>
</html>
