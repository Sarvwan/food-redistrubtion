<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Food Relief Platform</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <nav class="navbar">
    <a href="/index.html" class="nav-brand">
      <img src="/images/logo.png" alt="Food Relief Logo">
      Food Relief
    </a>
    <ul class="nav-links">
      <li><a href="/register.html" class="btn btn-outline">Register</a></li>
    </ul>
  </nav>

  <div class="form-container">
    <h2>Login to your Account</h2>
    <div id="alertContainer" class="alert hidden"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top:10px;">Login</button>
    </form>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();

        if (res.ok) {
          authHelper.setToken(result.token);
          authHelper.redirectBasedOnRole();
        } else {
          authHelper.showAlert(result.errors ? result.errors[0].msg : result.msg);
        }
      } catch (err) {
        authHelper.showAlert('An error occurred during login.');
      }
    });
  </script>
</body>
</html>
